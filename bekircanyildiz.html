<title>Bekir Can Yıldız — Karaköy Optik</title>
<meta name="description" content="Karaköy Optik dijital kartvizit — rehbere kaydet, ara, WhatsApp'tan yaz, Instagram'da gör.">
<meta name="theme-color" content="#0E1116">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --ink:#0E1116;
    --panel:#161B22;
    --panel-edge:rgba(243,239,230,0.09);
    --paper:#F3EFE6;
    --slate:#8A93A3;
    --brass:#C9A66B;
    --brass-deep:#9C7A43;
    --brass-soft:rgba(201,166,107,0.14);
    --prism-1:#E8553D;
    --prism-2:#F2C14E;
    --prism-3:#4FA9E0;
    --prism-4:#6EBE6A;
  }

  *{box-sizing:border-box;}

  html,body{margin:0;padding:0;}

  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 84% 8%, rgba(201,166,107,0.10), transparent 42%),
      radial-gradient(circle at 10% 92%, rgba(79,169,224,0.08), transparent 40%),
      var(--ink);
    color:var(--paper);
    font-family:'Inter', system-ui, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 18px;
  }

  .card{
    position:relative;
    width:100%;
    max-width:400px;
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:22px;
    padding:38px 28px 30px;
    box-shadow:0 30px 80px -30px rgba(0,0,0,0.65);
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--slate);
    text-align:center;
    margin:0 0 26px;
  }

  .dial-wrap{
    width:120px;
    height:120px;
    margin:0 auto 22px;
    position:relative;
  }

  .dial{
    width:100%;
    height:100%;
    color:var(--brass);
    animation:spin 90s linear infinite;
  }

  .dial line{ stroke:currentColor; opacity:0.55; }
  .dial circle.ring{ stroke:currentColor; opacity:0.35; }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  .initials{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:15px;
    letter-spacing:0.08em;
    color:var(--paper);
  }

  h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:28px;
    line-height:1.15;
    text-align:center;
    margin:0 0 10px;
    color:var(--paper);
  }

  .org{
    text-align:center;
    margin:0 0 30px;
  }

  .org-name{
    display:inline-block;
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:500;
    font-style:italic;
    font-size:16px;
    color:var(--slate);
    padding-bottom:8px;
    background-image:linear-gradient(90deg,var(--prism-1),var(--prism-2),var(--prism-3),var(--prism-4));
    background-size:100% 2px;
    background-repeat:no-repeat;
    background-position:bottom center;
  }

  .cta{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:15px 18px;
    border-radius:13px;
    border:none;
    background:var(--brass);
    color:#1A1410;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:15px;
    text-decoration:none;
    cursor:pointer;
    transition:background 0.15s ease, transform 0.15s ease;
  }
  .cta:hover{ background:var(--brass-deep); }
  .cta:active{ transform:scale(0.98); }
  .cta svg{ width:18px; height:18px; flex-shrink:0; }

  .cta-hint{
    text-align:center;
    font-size:12px;
    color:var(--slate);
    margin:10px 0 26px;
  }

  .actions{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:28px;
  }

  .action{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    padding:14px 6px;
    border-radius:12px;
    border:1px solid var(--panel-edge);
    background:transparent;
    color:var(--paper);
    text-decoration:none;
    font-size:12px;
    font-weight:500;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .action:hover{ border-color:var(--brass); background:var(--brass-soft); }
  .action svg{ width:20px; height:20px; color:var(--brass); }

  .divider{
    height:1px;
    background:var(--panel-edge);
    margin:0 0 22px;
  }

  .addr-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--slate);
    margin:0 0 10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .addr-label svg{ width:14px; height:14px; color:var(--brass); }

  address{
    font-style:normal;
    font-size:14px;
    line-height:1.6;
    color:var(--paper);
    margin:0 0 12px;
  }

  .maps-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    font-weight:600;
    color:var(--brass);
    text-decoration:none;
  }
  .maps-link:hover{ color:var(--brass-deep); }

  a:focus-visible, button:focus-visible{
    outline:2px solid var(--brass);
    outline-offset:3px;
  }

  @media (prefers-reduced-motion: reduce){
    .dial{ animation:none; }
  }
</style>

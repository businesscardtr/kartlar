<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gökhan Soya — Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: rgba(255,255,255,0.08);
    --accent: #c9a96e;
    --accent2: #e8c99a;
    --text: #f0ece4;
    --muted: #8a8680;
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, rgba(201,169,110,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    padding: 40px 32px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 32px; right: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .avatar { display: none; }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .title {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: none;
    margin-bottom: 4px;
  }

  .company {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  .body {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    cursor: pointer;
  }

  .row:last-child { border-bottom: none; }
  .row:hover .row-text { color: var(--accent2); }
  .row:hover .icon-wrap { border-color: rgba(201,169,110,0.4); background: rgba(201,169,110,0.08); }

  .icon-wrap {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    background: rgba(255,255,255,0.03);
  }

  .icon-wrap svg {
    width: 17px; height: 17px;
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .row-info { flex: 1; min-width: 0; }
  .row-label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
  .row-text { font-size: 14px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.2s; }
  .row-arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; opacity: 0.5; }

  .social-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 32px 28px;
  }

  .social-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    background: rgba(255,255,255,0.02);
    transition: all 0.2s;
    font-size: 13px;
    font-weight: 400;
  }

  .social-btn:hover {
    border-color: rgba(201,169,110,0.35);
    background: rgba(201,169,110,0.06);
    color: var(--accent2);
  }

  .social-btn svg {
    width: 16px; height: 16px;
    fill: var(--accent);
    flex-shrink: 0;
  }

  .save-btn {
    margin: 0 32px 32px;
    padding: 16px;
    width: calc(100% - 64px);
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .save-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .save-btn:active { transform: translateY(0); }

  .save-btn svg {
    width: 18px; height: 18px;
    fill: none;
    stroke: #0d0d0d;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e1e1e;
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--accent2);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 32px 12px;
    font-weight: 500;
  }
</style>
</head>

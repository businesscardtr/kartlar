<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Yılmaz — Kartvizit</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #161616;
    --border: rgba(255,255,255,0.08);
    --accent: #c9a96e;
    --accent2: #e8c99a;
    --text: #f0ece4;
    --muted: #8a8680;
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, rgba(201,169,110,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    padding: 40px 32px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 32px; right: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8b6914);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: #0d0d0d;
    font-weight: 600;
    margin-bottom: 20px;
    border: 2px solid rgba(201,169,110,0.3);
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .title {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .company {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  .body {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    cursor: pointer;
  }

  .row:last-child { border-bottom: none; }

  .row:hover .row-text { color: var(--accent2); }
  .row:hover .icon-wrap { border-color: rgba(201,169,110,0.4); background: rgba(201,169,110,0.08); }

  .icon-wrap {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    background: rgba(255,255,255,0.03);
  }

  .icon-wrap svg {
    width: 17px; height: 17px;
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .row-info { flex: 1; min-width: 0; }
  .row-label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
  .row-text { font-size: 14px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.2s; }

  .row-arrow {
    color: var(--muted);
    font-size: 16px;
    flex-shrink: 0;
    opacity: 0.5;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 4px 0;
  }

  .social-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 32px 28px;
  }

  .social-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    background: rgba(255,255,255,0.02);
    transition: all 0.2s;
    font-size: 13px;
    font-weight: 400;
  }

  .social-btn:hover {
    border-color: rgba(201,169,110,0.35);
    background: rgba(201,169,110,0.06);
    color: var(--accent2);
  }

  .social-btn svg {
    width: 16px; height: 16px;
    fill: var(--accent);
    flex-shrink: 0;
  }

  .save-btn {
    margin: 0 32px 32px;
    padding: 16px;
    width: calc(100% - 64px);
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .save-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .save-btn:active { transform: translateY(0); }

  .save-btn svg {
    width: 18px; height: 18px;
    fill: none;
    stroke: #0d0d0d;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e1e1e;
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--accent2);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 32px 12px;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="card">

  <!-- BAŞLIK -->
  <div class="header">
    <div class="avatar" id="avatar">AY</div>
    <div class="name" id="name">Ali Yılmaz</div>
    <div class="title" id="title">Kurucu & CEO</div>
    <div class="company" id="company">Yılmaz Teknoloji A.Ş.</div>
  </div>

  <!-- İLETİŞİM BİLGİLERİ -->
  <div class="body">

    <a class="row" href="tel:+905551234567" id="tel-row">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .84h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91A16 16 0 0015.1 17.9l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      </div>
      <div class="row-info">
        <div class="row-label">Telefon</div>
        <div class="row-text" id="phone-display">+90 555 123 45 67</div>
      </div>
      <div class="row-arrow">›</div>
    </a>

    <a class="row" href="mailto:ali@yilmazteknoloji.com" id="mail-row">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
      </div>
      <div class="row-info">
        <div class="row-label">E-posta</div>
        <div class="row-text" id="email-display">ali@yilmazteknoloji.com</div>
      </div>
      <div class="row-arrow">›</div>
    </a>

    <a class="row" href="https://www.yilmazteknoloji.com" target="_blank" id="web-row">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
      </div>
      <div class="row-info">
        <div class="row-label">Web</div>
        <div class="row-text" id="web-display">www.yilmazteknoloji.com</div>
      </div>
      <div class="row-arrow">›</div>
    </a>

    <a class="row" href="https://maps.google.com/?q=Maslak+Mahallesi,+Büyükdere+Cad.+No:123,+Sarıyer,+İstanbul" target="_blank" id="addr-row">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="row-info">
        <div class="row-label">Adres</div>
        <div class="row-text" id="addr-display">Maslak, Büyükdere Cad. No:123, İstanbul</div>
      </div>
      <div class="row-arrow">›</div>
    </a>

  </div>

  <!-- SOSYAL MEDYA -->
  <div class="section-label">Sosyal Medya</div>
  <div class="social-grid">

    <a class="social-btn" href="https://linkedin.com/in/aliyilmaz" target="_blank" id="linkedin-btn">
      <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
      <span id="linkedin-display">LinkedIn</span>
    </a>

    <a class="social-btn" href="https://instagram.com/aliyilmaz" target="_blank" id="instagram-btn">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      <span id="instagram-display">Instagram</span>
    </a>

    <a class="social-btn" href="https://twitter.com/aliyilmaz" target="_blank" id="twitter-btn">
      <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/></svg>
      <span id="twitter-display">Twitter / X</span>
    </a>

    <a class="social-btn" href="https://wa.me/905551234567" target="_blank" id="whatsapp-btn">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      <span>WhatsApp</span>
    </a>

  </div>

  <!-- KAYDET BUTONU -->
  <button class="save-btn" onclick="saveContact()">
    <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Rehbere Kaydet
  </button>

</div>

<div class="toast" id="toast">✓ Rehbere kaydedildi</div>

<script>
// ============================================================
// KİŞİ BİLGİLERİ — sadece bu bölümü değiştir
// ============================================================
const kisi = {
  ad:        "Ali",
  soyad:     "Yılmaz",
  unvan:     "Kurucu & CEO",
  sirket:    "Yılmaz Teknoloji A.Ş.",
  telefon:   "+905551234567",
  email:     "ali@yilmazteknoloji.com",
  web:       "https://www.yilmazteknoloji.com",
  adres:     "Maslak, Büyükdere Cad. No:123, Sarıyer/İstanbul",
  linkedin:  "https://linkedin.com/in/aliyilmaz",
  instagram: "https://instagram.com/aliyilmaz",
  twitter:   "https://twitter.com/aliyilmaz",
  whatsapp:  "+905551234567",
};
// ============================================================

// Sayfayı doldur
document.getElementById('avatar').textContent = kisi.ad[0] + kisi.soyad[0];
document.getElementById('name').textContent = kisi.ad + ' ' + kisi.soyad;
document.getElementById('title').textContent = kisi.unvan;
document.getElementById('company').textContent = kisi.sirket;
document.getElementById('phone-display').textContent = kisi.telefon;
document.getElementById('email-display').textContent = kisi.email;
document.getElementById('web-display').textContent = kisi.web.replace('https://','').replace('http://','');
document.getElementById('addr-display').textContent = kisi.adres;
document.getElementById('tel-row').href = 'tel:' + kisi.telefon;
document.getElementById('mail-row').href = 'mailto:' + kisi.email;
document.getElementById('web-row').href = kisi.web;
document.getElementById('linkedin-btn').href = kisi.linkedin;
document.getElementById('instagram-btn').href = kisi.instagram;
document.getElementById('twitter-btn').href = kisi.twitter;
document.getElementById('whatsapp-btn').href = 'https://wa.me/' + kisi.whatsapp.replace(/\D/g,'');
document.title = kisi.ad + ' ' + kisi.soyad + ' — Kartvizit';

// Google Maps adresi
document.getElementById('addr-row').href = 'https://maps.google.com/?q=' + encodeURIComponent(kisi.adres);

// Rehbere Kaydet (vCard indir)
function saveContact() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:' + kisi.ad + ' ' + kisi.soyad,
    'N:' + kisi.soyad + ';' + kisi.ad + ';;;',
    'ORG:' + kisi.sirket,
    'TITLE:' + kisi.unvan,
    'TEL;TYPE=CELL:' + kisi.telefon,
    'EMAIL:' + kisi.email,
    'URL:' + kisi.web,
    'ADR;TYPE=WORK:;;' + kisi.adres + ';;;;',
    'X-SOCIALPROFILE;type=linkedin:' + kisi.linkedin,
    'X-SOCIALPROFILE;type=instagram:' + kisi.instagram,
    'X-SOCIALPROFILE;type=twitter:' + kisi.twitter,
    'END:VCARD'
  ].join('\n');

  const blob = new Blob([vcard], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = kisi.ad + '_' + kisi.soyad + '.vcf';
  a.click();
  URL.revokeObjectURL(url);

  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seyis — At Bakım Uzmanı</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0f0c08;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  color: #f0ece4;
}

/* ── PHOTO HEADER ── */
.photo-header {
  width: 100%;
  position: relative;
  overflow: hidden;
}

.photo-header img {
  width: 100%;
  display: block;
  object-fit: cover;
  object-position: center top;
}

/* Gradient over bottom of photo */
.photo-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(180deg, transparent, #0f0c08);
  pointer-events: none;
}

/* Gold top stripe */
.photo-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #c9a96e, #e8c88a, #c9a96e, transparent);
  z-index: 10;
}

/* ── NAME BLOCK overlaid on photo bottom ── */
.name-block {
  position: relative;
  padding: 0 20px 16px;
  margin-top: -28px;
  z-index: 5;
}

.name {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 600;
  color: #f0ece4;
  line-height: 1.05;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
}

.title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}

.title {
  font-size: 11px;
  color: #c9a96e;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.badge {
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 20px;
  background: rgba(201,169,110,0.12);
  border: 1px solid rgba(201,169,110,0.3);
  color: rgba(201,169,110,0.8);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 400;
}

/* ── DIVIDER ── */
.gold-divider {
  height: 1px;
  margin: 0 20px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3), transparent);
}

/* ── CONTACTS ── */
.contacts {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.contact-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 13px 16px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}

.contact-btn:active { transform: scale(0.98); }

.contact-btn.wp {
  background: rgba(37,211,102,0.08);
  border-color: rgba(37,211,102,0.2);
}

.contact-btn.phone {
  background: rgba(201,169,110,0.06);
  border-color: rgba(201,169,110,0.2);
}

.contact-icon {
  font-size: 20px;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
}

.contact-info { flex: 1; }

.contact-label {
  font-size: 9px;
  color: var(--muted, #6a6260);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 300;
  display: block;
  margin-bottom: 2px;
}

.contact-value {
  font-size: 15px;
  font-weight: 500;
  display: block;
}

.contact-value.phone-val { color: #c9a96e; }
.contact-value.wp-val { color: #25d366; }

.contact-arrow {
  font-size: 16px;
  opacity: 0.4;
}

/* ── SERVICES ── */
.services-section {
  padding: 4px 20px 16px;
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(201,169,110,0.4);
  font-weight: 300;
  padding: 12px 0 8px;
}

.services-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.svc-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.svc-emoji { font-size: 18px; flex-shrink: 0; }
.svc-text { font-size: 11px; color: #c8c0b0; font-weight: 300; line-height: 1.3; }
.svc-text strong { display: block; font-weight: 500; color: #f0ece4; font-size: 12px; }

/* ── VIDEO ── */
.video-section {
  padding: 0 20px 16px;
}

.video-label {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(201,169,110,0.4);
  font-weight: 300;
  padding: 4px 0 10px;
}

.video-wrap {
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  border: 1px solid rgba(201,169,110,0.15);
}

.video-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
  display: block;
}

/* ── FOOTER ── */
.footer {
  padding: 16px 20px 36px;
  text-align: center;
}

.footer-text {
  font-size: 9px;
  color: rgba(201,169,110,0.25);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 300;
}
</style>
</head>
